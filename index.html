<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>C · L · A</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/assets/theme.css">
  <style>
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-2xl) var(--space-lg);
    }

    .hero-eyebrow {
      font-family: var(--f-ui);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: var(--space-lg);
    }

    .hero-heading {
      font-family: var(--f-display);
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      font-weight: 300;
      line-height: 1.08;
      color: var(--text);
      margin-bottom: var(--space-xl);
      letter-spacing: -0.01em;
    }

    .hero-heading em {
      font-style: italic;
      color: var(--gold);
    }

    .hero-rule {
      width: 40px;
      height: 1px;
      background: var(--gold-dim);
      margin: 0 auto var(--space-xl);
    }

    .hero-sub {
      font-family: var(--f-display);
      font-size: 16px;
      font-style: italic;
      font-weight: 400;
      color: var(--text-2);
      max-width: 440px;
      line-height: 1.7;
      margin-bottom: var(--space-xl);
    }
  </style>
</head>
<body>

  <nav class="cla-nav">
    <a class="wordmark" href="/">C · L · A<br>L · A · W</a>
    <div class="nav-links">
      <a href="/tools/">Tools</a>
    </div>
  </nav>

  <main>
    <div class="hero-eyebrow">Christopher L. Anderson</div>
    <h1 class="hero-heading">Converse<br>and <em>Deliberate.</em></h1>
    <div class="hero-rule"></div>
    <p class="hero-sub">Writing, reading, music, and the occasional legal aperçu.<br>Juneau-raised, Seattle-rooted.</p>
    <a class="btn-ghost" href="/tools/">Explore →</a>
  </main>

  <footer class="cla-footer">clalaw.me</footer>

</body>
</html>
