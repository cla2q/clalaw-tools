<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>C · L · A — Watchlist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/assets/theme.css">
  <style>
    body { padding: 24px 16px 64px; }

    /* PAGE HEADER */
    .page-header { text-align: center; margin-bottom: 28px; }
    .page-eyebrow { font-family: var(--f-ui); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold-dim); margin-bottom: 10px; }
    .page-title { font-family: var(--f-display); font-size: 36px; font-weight: 300; color: var(--text); line-height: 1.1; margin-bottom: 6px; }
    .page-sub { font-family: var(--f-display); font-size: 14px; font-style: italic; color: var(--text-2); }

    /* ADD FORM */
    .add-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-lg) var(--space-lg);
      margin: 0 auto var(--space-xl);
      max-width: 760px;
    }
    .add-form-label {
      font-family: var(--f-ui);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: var(--space-md);
      display: block;
    }
    .form-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .form-row input, .form-row select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--f-display);
      font-size: 15px;
      font-style: italic;
      padding: 9px 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-row input::placeholder { color: var(--text-3); }
    .form-row input:focus, .form-row select:focus { border-color: var(--gold-dim); font-style: normal; }
    .form-row select { font-style: normal; font-family: var(--f-ui); font-size: 11px; letter-spacing: 0.08em; cursor: pointer; }
    .form-row select option { background: var(--bg); color: var(--text); }
    .form-row input[name="title"] { flex: 2; min-width: 160px; }
    .form-row select { flex: 1; min-width: 100px; }
    .form-row input[name="addedBy"] { flex: 1; min-width: 100px; }
    .btn-add {
      background: var(--gold);
      color: var(--bg);
      border: none;
      border-radius: var(--radius-sm);
      padding: 9px 22px;
      font-family: var(--f-ui);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-add:hover { opacity: 0.88; }

    /* FILTERS */
    .filters {
      display: flex;
      gap: 8px;
      margin: 0 auto var(--space-lg);
      flex-wrap: wrap;
      max-width: 760px;
    }
    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      color: var(--text-3);
      font-family: var(--f-ui);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
    .filter-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(200,169,110,0.08); }

    /* ITEM LIST */
    .item-list { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }

    /* ITEM CARD */
    .item-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.15s;
    }
    .item-card:hover { border-color: var(--gold-dim); }
    .item-card.watched {
      background: rgba(106,158,114,0.05);
      border-color: rgba(106,158,114,0.2);
    }
    .item-card.watched .item-title {
      text-decoration: line-through;
      color: var(--text-3);
    }

    /* TYPE BADGES */
    .type-badge {
      font-family: var(--f-ui);
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: var(--radius-sm);
      border: 1px solid;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .type-badge.movie { background: rgba(180,140,220,0.1);  color: #c8a0e8; border-color: rgba(180,140,220,0.2); }
    .type-badge.tv    { background: rgba(100,160,220,0.1);  color: #8ab4e0; border-color: rgba(100,160,220,0.2); }
    .type-badge.doc   { background: rgba(200,169,110,0.1);  color: var(--gold); border-color: rgba(200,169,110,0.2); }
    .type-badge.book  { background: rgba(106,158,114,0.1);  color: var(--green); border-color: rgba(106,158,114,0.2); }
    .type-badge.music { background: rgba(184,92,74,0.1);    color: var(--red); border-color: rgba(184,92,74,0.2); }

    /* ITEM INFO */
    .item-info { flex: 1; min-width: 0; }
    .item-title { font-family: var(--f-display); font-size: 1rem; font-weight: 400; color: var(--text); line-height: 1.3; }
    .item-meta { font-family: var(--f-ui); font-size: 10px; letter-spacing: 0.06em; color: var(--text-3); margin-top: 3px; }

    /* ACTION BUTTONS */
    .item-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-3);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 5px 10px;
      transition: all 0.15s;
      font-family: var(--f-ui);
    }
    .icon-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
    .icon-btn.delete:hover { border-color: var(--red); color: var(--red); }
    .icon-btn.watched-btn:hover { border-color: var(--green); color: var(--green); }

    /* MISC */
    .empty { text-align: center; color: var(--text-3); padding: 40px; font-family: var(--f-display); font-style: italic; font-size: 1rem; }
    .status-bar { text-align: center; font-family: var(--f-ui); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); margin: var(--space-xl) auto 0; max-width: 760px; }
    #loading { text-align: center; color: var(--text-3); padding: 40px; font-family: var(--f-display); font-style: italic; }

    @media (max-width: 540px) {
      .form-row { flex-direction: column; }
      .form-row input, .form-row select, .btn-add { width: 100%; }
    }
  </style>
</head>
<body>

<nav class="cla-nav">
  <a class="wordmark" href="/">C · L · A<br>L · A · W</a>
  <div class="nav-links">
    <a href="/tools/">← Tools</a>
    <a href="#" id="sign-out-link">Sign out</a>
  </div>
</nav>

<div class="page-header">
  <div class="page-eyebrow"><i class="ti ti-list" aria-hidden="true"></i> Shared</div>
  <h1 class="page-title">Watchlist</h1>
  <p class="page-sub">Films, TV, books, and music — add from any device.</p>
</div>

<div class="add-form">
  <span class="add-form-label">Add something</span>
  <div class="form-row">
    <input name="title" type="text" placeholder="Title" id="titleInput" />
    <select id="typeInput">
      <option value="movie">Movie</option>
      <option value="tv">TV</option>
      <option value="doc">Doc</option>
      <option value="book">Book</option>
      <option value="music">Music</option>
    </select>
    <input name="addedBy" type="text" placeholder="Added by" id="addedByInput" />
    <button class="btn-add" onclick="addItem()">Add →</button>
  </div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn" onclick="setFilter('unwatched', this)">To Watch</button>
  <button class="filter-btn" onclick="setFilter('movie', this)">Movies</button>
  <button class="filter-btn" onclick="setFilter('tv', this)">TV</button>
  <button class="filter-btn" onclick="setFilter('doc', this)">Docs</button>
  <button class="filter-btn" onclick="setFilter('book', this)">Books</button>
  <button class="filter-btn" onclick="setFilter('music', this)">Music</button>
  <button class="filter-btn" onclick="setFilter('watched', this)">Done</button>
</div>

<div id="loading">Loading watchlist…</div>
<div class="item-list" id="itemList"></div>
<div class="status-bar" id="statusBar"></div>

<footer class="cla-footer">clalaw.me / tools / watchlist</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, doc, getDoc, updateDoc, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBfayRskS6VQ8zLMesm3_4ZB1HX84ZbPJ8",
    authDomain: "clalaw-media-watchlist.firebaseapp.com",
    projectId: "clalaw-media-watchlist",
    storageBucket: "clalaw-media-watchlist.firebasestorage.app",
    messagingSenderId: "980630708974",
    appId: "1:980630708974:web:8e3d0f9a0d9848b2df49ff"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const colRef = collection(db, "watchlist");

  // Auth guard — allowlist managed in Firestore at config/allowed-emails
  document.body.style.visibility = 'hidden';
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = `/tools/login.html?redirect=${encodeURIComponent(window.location.pathname)}`;
      return;
    }
    const allowDoc = await getDoc(doc(db, 'config', 'allowed-emails'));
    const allowed = allowDoc.exists() ? (allowDoc.data().emails || []) : [];
    if (!allowed.includes(user.email)) {
      await signOut(auth);
      window.location.href = '/tools/login.html?error=unauthorized';
    } else {
      document.body.style.visibility = 'visible';
    }
  });

  let allItems = [];
  let currentFilter = 'all';

  document.getElementById('sign-out-link').addEventListener('click', async (e) => {
    e.preventDefault();
    await signOut(auth);
    window.location.href = '/tools/login.html';
  });

  const q = query(colRef, orderBy("createdAt", "desc"));
  onSnapshot(q, (snapshot) => {
    allItems = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    document.getElementById('loading').style.display = 'none';
    render();
  });

  function render() {
    const list = document.getElementById('itemList');
    const filtered = allItems.filter(item => {
      if (currentFilter === 'all') return true;
      if (currentFilter === 'watched') return item.watched;
      if (currentFilter === 'unwatched') return !item.watched;
      return item.type === currentFilter && !item.watched;
    });

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty">Nothing here yet.</div>';
    } else {
      list.innerHTML = filtered.map(item => `
        <div class="item-card ${item.watched ? 'watched' : ''}">
          <span class="type-badge ${item.type}">${item.type}</span>
          <div class="item-info">
            <div class="item-title">${escHtml(item.title)}</div>
            <div class="item-meta">Added by ${escHtml(item.addedBy || 'unknown')}</div>
          </div>
          <div class="item-actions">
            <button class="icon-btn watched-btn" onclick="toggleWatched('${item.id}', ${item.watched})" title="${item.watched ? 'Mark unwatched' : 'Mark watched'}">
              ${item.watched ? '↩' : '✓'}
            </button>
            <button class="icon-btn delete" onclick="removeItem('${item.id}')" title="Delete">✕</button>
          </div>
        </div>
      `).join('');
    }

    const total = allItems.length;
    const watched = allItems.filter(i => i.watched).length;
    document.getElementById('statusBar').textContent = `${watched} of ${total} done`;
  }

  window.addItem = async function() {
    const title = document.getElementById('titleInput').value.trim();
    const type = document.getElementById('typeInput').value;
    const addedBy = document.getElementById('addedByInput').value.trim() || 'someone';
    if (!title) return;
    await addDoc(colRef, { title, type, addedBy, watched: false, createdAt: serverTimestamp() });
    document.getElementById('titleInput').value = '';
  };

  window.toggleWatched = async function(id, current) {
    await updateDoc(doc(db, 'watchlist', id), { watched: !current });
  };

  window.removeItem = async function(id) {
    if (confirm('Remove this from the list?')) {
      await deleteDoc(doc(db, 'watchlist', id));
    }
  };

  window.setFilter = function(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  };

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('titleInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.addItem();
  });
</script>
</body>
</html>
