  .album-card.need .toggle-label { color: var(--red); }

    { rank: 99, artist:"Cream",                                 title:"Wheels of Fire",                                  year:1968, label:"Atco",            note:"The studio half is great, but the four live songs are better — the trio tears through blues standards 'Crossroads' and 'Spoonful' like they were theirs from the very start." },
    { rank:100, artist:"The Yardbirds",                         title:"Five Live Yardbirds",                             year:1964, label:"Columbia",        note:"The album that made Eric Clapton a god to guitar-worshiping kids across the U.K. — an explosive document of a British blues band fueling American music with power and resourcefulness." },
  ];

  const syncStatus = document.getElementById('sync-status');
  let state = {};
  let activeFilter = 'all';

  function iconFor(s)  { return s === 'have' ? '✓' : s === 'need' ? '◯' : '·'; }
  function labelFor(s) { return s === 'have' ? 'Have it' : s === 'need' ? 'Need it' : 'Unset'; }
  function cycleStatus(cur) { return !cur ? 'have' : cur === 'have' ? 'need' : null; }

  function renderCards() {
    const list = document.getElementById('album-list');
    list.innerHTML = '';
    albums.forEach(a => {
      const s = state[a.rank] || null;
      const card = document.createElement('div');
      card.className = 'album-card' + (s ? ' ' + s : '');
      card.dataset.rank = a.rank;
      card.innerHTML = `
        <div class="status-stripe"></div>
        <div class="rank-badge">
          <span class="rank-label">Rank</span>
          <span class="rank-num">${a.rank}</span>
        </div>
        <div class="album-info">
          <div class="album-artist">${a.artist}</div>
          <div class="album-title">${a.title}</div>
          <div class="album-meta">
            <span class="album-year">${a.year}</span>
            <span class="album-label">${a.label}</span>
          </div>
          <div class="album-note">${a.note}</div>
        </div>
        <div class="toggle-wrap">
          <button class="toggle-btn" title="Click to toggle status">
            <div class="toggle-icon">${iconFor(s)}</div>
            <span class="toggle-label">${labelFor(s)}</span>
          </button>
        </div>
      `;
      card.querySelector('.toggle-btn').addEventListener('click', async (e) => {
        e.stopPropagation();
        const cur = state[a.rank] || null;
        const next = cycleStatus(cur);
        if (next) state[a.rank] = next;
        else delete state[a.rank];
        card.className = 'album-card' + (next ? ' ' + next : '');
        card.querySelector('.toggle-icon').textContent = iconFor(next);
        card.querySelector('.toggle-label').textContent = labelFor(next);
        updateStats();
        applyFilter();
        syncStatus.textContent = 'Saving…';
        syncStatus.style.color = 'var(--gold)';
        await setDoc(docRef, state, { merge: false });
      });
      list.appendChild(card);
    });
  }

  function updateStats() {
    let have = 0, need = 0;
    albums.forEach(a => {
      const s = state[a.rank];
      if (s === 'have') have++;
      if (s === 'need') need++;
    });
    document.getElementById('have-num').textContent = have;
    document.getElementById('need-num').textContent = need;
    const pct = Math.round((have / albums.length) * 100);
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  function applyFilter() {
    document.querySelectorAll('.album-card').forEach(card => {
      const s = state[card.dataset.rank] || null;
      const match = (
        activeFilter === 'all' ||
        (activeFilter === 'have' && s === 'have') ||
        (activeFilter === 'need' && s === 'need') ||
        (activeFilter === 'unset' && !s)
      );
      card.classList.toggle('hidden', !match);
    });
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      applyFilter();
    });
  });

  document.getElementById('btn-mark-all').addEventListener('click', async () => {
    albums.forEach(a => { state[a.rank] = 'have'; });
    renderCards(); updateStats(); applyFilter();
    await setDoc(docRef, state, { merge: false });
  });

  document.getElementById('btn-clear-all').addEventListener('click', async () => {
    state = {};
    renderCards(); updateStats(); applyFilter();
    await setDoc(docRef, {}, { merge: false });
  });

  document.getElementById('sign-out-link').addEventListener('click', async (e) => {
    e.preventDefault();
    await signOut(auth);
    window.location.href = '/tools/login.html';
  });

  onSnapshot(docRef, (snapshot) => {
    state = snapshot.exists() ? snapshot.data() : {};
    renderCards();
    updateStats();
    applyFilter();
    syncStatus.textContent = 'Synced';
    syncStatus.style.color = 'var(--green)';
  });
</script>
</body>
</html>
