<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>C · L · A — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/assets/theme.css">
  <style>
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-2xl) var(--space-lg);
    }

    .login-box {
      width: 100%;
      max-width: 400px;
    }

    .login-heading {
      font-family: var(--f-display);
      font-size: 40px;
      font-weight: 300;
      color: var(--text);
      text-align: center;
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .login-sub {
      font-family: var(--f-display);
      font-size: 16px;
      font-style: italic;
      color: var(--text-3);
      text-align: center;
      margin-bottom: var(--space-xl);
    }

    .google-icon { width: 18px; height: 18px; flex-shrink: 0; }
  </style>
</head>
<body>

  <nav class="cla-nav">
    <a class="wordmark" href="/">C · L · A<br>L · A · W</a>
  </nav>

  <main>
    <div class="login-box">

      <h1 class="login-heading">Sign in.</h1>
      <p class="login-sub">Private access.</p>

      <button class="btn-google" id="google-btn">
        <svg class="google-icon" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.8 2.5 30.2 0 24 0 14.6 0 6.6 5.4 2.6 13.3l7.9 6.1C12.4 13 17.7 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-10 6.9-17z"/>
          <path fill="#FBBC05" d="M10.5 28.6A14.8 14.8 0 0 1 9.5 24c0-1.6.3-3.1.8-4.6l-7.9-6.1A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.9-6.1z"/>
          <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.3 0-11.6-4.2-13.5-9.9l-7.9 6.1C6.6 42.6 14.6 48 24 48z"/>
        </svg>
        Continue with Google
      </button>

      <div class="divider-or mt-lg mb-lg"><span>or</span></div>

      <label class="field-label" for="email">Email</label>
      <input class="field-input" type="email" id="email" autocomplete="email" placeholder="you@example.com" />

      <label class="field-label" for="password">Password</label>
      <input class="field-input" type="password" id="password" autocomplete="current-password" placeholder="••••••••" />

      <button class="btn-ghost btn-block" id="email-btn">Sign in →</button>

      <div class="field-error" id="error-msg"></div>

    </div>
  </main>

  <footer class="cla-footer">clalaw.me</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBfayRskS6VQ8zLMesm3_4ZB1HX84ZbPJ8",
    authDomain: "clalaw-media-watchlist.firebaseapp.com",
    projectId: "clalaw-media-watchlist",
    storageBucket: "clalaw-media-watchlist.firebasestorage.app",
    messagingSenderId: "980630708974",
    appId: "1:980630708974:web:8e3d0f9a0d9848b2df49ff"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  const params = new URLSearchParams(window.location.search);
  const redirect = params.get('redirect') || '/tools/';
  const errorMsg = document.getElementById('error-msg');

  if (params.get('error') === 'unauthorized') {
    errorMsg.textContent = 'That account does not have access.';
  }

  async function getAllowed() {
    const allowDoc = await getDoc(doc(db, 'config', 'allowed-emails'));
    return allowDoc.exists() ? (allowDoc.data().emails || []) : [];
  }

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const allowed = await getAllowed();
      if (allowed.includes(user.email)) {
        window.location.href = redirect;
      } else {
        await signOut(auth);
        errorMsg.textContent = 'That account does not have access.';
      }
    }
  });

  document.getElementById('google-btn').addEventListener('click', async (e) => {
    e.currentTarget.disabled = true;
    errorMsg.textContent = '';
    try {
      await signInWithPopup(auth, provider);
    } catch (err) {
      errorMsg.textContent = 'Sign-in cancelled or failed. Try again.';
      e.currentTarget.disabled = false;
    }
  });

  async function emailSignIn() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) return;
    const btn = document.getElementById('email-btn');
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    errorMsg.textContent = '';
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (err) {
      errorMsg.textContent = 'Incorrect email or password.';
      btn.disabled = false;
      btn.textContent = 'Sign in →';
    }
  }

  document.getElementById('email-btn').addEventListener('click', emailSignIn);
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') emailSignIn();
  });
</script>
</body>
</html>
