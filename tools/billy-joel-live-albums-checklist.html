<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C · L · A — Billy Joel Live Albums</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="/assets/theme.css">
<style>
  :root {
    --green-dark: #4a8a52;
    --green-bg:   rgba(106,158,114,0.08);
    --red-dark:   #8a3a2a;
    --need-bg:    rgba(184,92,74,0.06);
    --transition: 0.2s ease;
  }

  body { padding: 24px 16px 64px; }

  /* HEADER */
  .page-header { text-align: center; margin-bottom: 28px; max-width: 820px; margin-left: auto; margin-right: auto; }
  .page-eyebrow { font-family: var(--f-ui); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold-dim); margin-bottom: 10px; }
  .page-title { font-family: var(--f-display); font-size: 36px; font-weight: 300; color: var(--text); line-height: 1.1; margin-bottom: 6px; }
  .page-sub { font-family: var(--f-display); font-size: 14px; font-style: italic; color: var(--text-2); }

  /* STATS */
  .stats-bar { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 24px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 10px 20px; text-align: center; min-width: 100px; }
  .stat .num { font-family: var(--f-display); font-size: 2rem; font-weight: 300; display: block; }
  .stat .lbl { font-family: var(--f-ui); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-3); }
  #stat-have .num { color: var(--green); }
  #stat-need .num { color: var(--red); }
  #stat-total .num { color: var(--gold); }

  /* PROGRESS */
  .progress-wrap { max-width: 600px; margin: 0 auto 24px; }
  .progress-label { display: flex; justify-content: space-between; font-family: var(--f-ui); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); margin-bottom: 6px; }
  .progress-bar { height: 2px; background: var(--surface-2); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 99px; transition: width 0.4s ease; width: 0%; }

  /* SYNC */
  #sync-status { text-align: center; font-family: var(--f-ui); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); margin-bottom: 16px; }

  /* CONTROLS */
  .controls { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 28px; }
  .filter-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-3); padding: 6px 16px; border-radius: 99px; font-family: var(--f-ui); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: var(--transition); }
  .filter-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
  .filter-btn.active { background: var(--red); border-color: var(--red); color: var(--text); }
  .btn-mark-all, .btn-clear-all { background: transparent; border: 1px solid var(--border); color: var(--text-3); padding: 6px 16px; border-radius: 99px; font-family: var(--f-ui); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: var(--transition); }
  .btn-mark-all:hover { border-color: var(--green); color: var(--green); }
  .btn-clear-all:hover { border-color: var(--red); color: var(--red); }

  /* SECTION LABEL */
  .section-label { font-family: var(--f-ui); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-3); max-width: 820px; margin: 8px auto 4px; padding-left: 4px; }

  /* ALBUM LIST */
  .album-list { max-width: 820px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }

  /* ALBUM CARD */
  .album-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); display: flex; align-items: stretch; overflow: hidden; transition: border-color var(--transition); position: relative; }
  .album-card:hover { border-color: var(--gold-dim); }
  .album-card.have { border-color: rgba(106,158,114,0.35); background: linear-gradient(135deg, var(--green-bg), var(--surface)); }
  .album-card.need { border-color: rgba(184,92,74,0.25); background: linear-gradient(135deg, var(--need-bg), var(--surface)); }
  .album-card.hidden { display: none; }

  .status-stripe { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .album-card.have .status-stripe { background: var(--green); }
  .album-card.need .status-stripe { background: var(--red); }

  .rank-badge { display: flex; align-items: center; justify-content: center; min-width: 56px; font-family: var(--f-display); font-weight: 300; font-size: 1.4rem; color: var(--text-3); background: var(--surface-2); border-right: 1px solid var(--border); flex-shrink: 0; position: relative; }
  .album-card.have .rank-badge { color: var(--green); }
  .album-card.need .rank-badge { color: var(--red); }
  .rank-badge .rank-label { font-family: var(--f-ui); font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-3); position: absolute; top: 8px; left: 50%; transform: translateX(-50%); white-space: nowrap; }

  .album-info { flex: 1; padding: 12px 14px; display: flex; flex-direction: column; gap: 4px; }
  .album-title { font-family: var(--f-display); font-weight: 400; font-size: 1rem; color: var(--text); line-height: 1.3; }
  .album-meta { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .album-year { font-family: var(--f-ui); font-size: 10px; font-weight: 400; color: var(--gold); background: rgba(200,169,110,0.1); padding: 2px 7px; border-radius: var(--radius-sm); letter-spacing: 0.08em; }
  .album-label { font-family: var(--f-ui); font-size: 10px; letter-spacing: 0.08em; color: var(--text-3); }
  .album-note { font-family: var(--f-display); font-size: 13px; font-style: italic; color: var(--text-2); line-height: 1.55; margin-top: 2px; }

  .toggle-wrap { display: flex; align-items: center; padding: 0 16px; flex-shrink: 0; }
  .toggle-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; background: none; border: none; padding: 6px; border-radius: var(--radius-md); transition: var(--transition); }
  .toggle-btn:hover { background: rgba(255,255,255,0.04); }
  .toggle-icon { width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 1rem; transition: var(--transition); background: var(--surface-2); color: var(--text-3); }
  .album-card.have .toggle-icon { background: var(--green-dark); border-color: var(--green); color: var(--text); }
  .album-card.need .toggle-icon { background: var(--red-dark); border-color: var(--red); color: var(--text); }
  .toggle-label { font-family: var(--f-ui); font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-3); }
  .album-card.have .toggle-label { color: var(--green); }
  .album-card.need .toggle-label { color: var(--red); }

  @media (max-width: 540px) {
    .album-note { display: none; }
    .rank-badge { min-width: 42px; font-size: 1.1rem; }
    .toggle-wrap { padding: 0 10px; }
  }
</style>
</head>
<body>

<nav class="cla-nav">
  <a class="wordmark" href="/">C · L · A<br>L · A · W</a>
  <div class="nav-links">
    <a href="/tools/">← Tools</a>
    <a href="#" id="sign-out-link">Sign out</a>
  </div>
</nav>

<div class="page-header">
  <div class="page-eyebrow"><i class="ti ti-vinyl" aria-hidden="true"></i> Billy Joel</div>
  <h1 class="page-title">Live Albums</h1>
  <p class="page-sub">Ranked by Ultimate Classic Rock — mark what you have or still need</p>
</div>

<div class="stats-bar">
  <div class="stat" id="stat-total"><span class="num" id="total-num">11</span><span class="lbl">Total</span></div>
  <div class="stat" id="stat-have"><span class="num" id="have-num">0</span><span class="lbl">Have it</span></div>
  <div class="stat" id="stat-need"><span class="num" id="need-num">0</span><span class="lbl">Need it</span></div>
</div>

<div class="progress-wrap">
  <div class="progress-label"><span>Collection progress</span><span id="progress-pct">0%</span></div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<div id="sync-status">Connecting…</div>

<div class="controls">
  <button class="filter-btn active" data-filter="all">All (11)</button>
  <button class="filter-btn" data-filter="have">Have it</button>
  <button class="filter-btn" data-filter="need">Need it</button>
  <button class="filter-btn" data-filter="unset">Unmarked</button>
  <button class="btn-mark-all" id="btn-mark-all">✓ Mark all</button>
  <button class="btn-clear-all" id="btn-clear-all">✕ Clear all</button>
</div>

<div class="section-label">▼ Worst</div>
<div class="album-list" id="album-list"></div>
<div class="section-label" style="margin-top:8px;">▲ Best</div>

<div class="section-label" style="margin-top:24px;">Not ranked</div>
<div class="album-list" id="unranked-list"></div>

<footer class="cla-footer">Ranked by <a href="https://ultimateclassicrock.com/billy-joel-live-albums-ranked/" target="_blank" style="color:var(--gold-dim);">Ultimate Classic Rock</a> · July 2024</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getFirestore, doc, getDoc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBfayRskS6VQ8zLMesm3_4ZB1HX84ZbPJ8",
    authDomain: "clalaw-media-watchlist.firebaseapp.com",
    projectId: "clalaw-media-watchlist",
    storageBucket: "clalaw-media-watchlist.firebasestorage.app",
    messagingSenderId: "980630708974",
    appId: "1:980630708974:web:8e3d0f9a0d9848b2df49ff"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const docRef = doc(db, "checklists", "billy-joel");

  // Auth guard — allowlist managed in Firestore at config/allowed-emails
  document.body.style.visibility = 'hidden';
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = `/tools/login.html?redirect=${encodeURIComponent(window.location.pathname)}`;
      return;
    }
    const allowDoc = await getDoc(doc(db, 'config', 'allowed-emails'));
    const allowed = allowDoc.exists() ? (allowDoc.data().emails || []) : [];
    if (!allowed.includes(user.email)) {
      await signOut(auth);
      window.location.href = '/tools/login.html?error=unauthorized';
    } else {
      document.body.style.visibility = 'visible';
    }
  });

  const albums = [
    { rank: 11, title: "Kohuept", year: 1987, label: "Columbia", note: "Historic Soviet Union concerts — the first major Western rock shows there — but the performances feel restrained by the occasion." },
    { rank: 10, title: "Live at Shea Stadium: The Concert", year: 2011, label: "Sony", note: "The final shows at Shea before demolition; a farewell event more than a musical peak, despite the historic setting." },
    { rank: 9,  title: "2000 Years: The Millennium Concert", year: 2000, label: "Columbia", note: "Madison Square Garden on New Year's Eve 1999; milestone date, solid performance, but feels more like an event album." },
    { rank: 8,  title: "Live in the Studio – Sigma Studios 1972", year: 2010, label: "Columbia", note: "Archival curiosity from early in his career; raw and rough, for completists rather than casual listeners." },
    { rank: 7,  title: "Live at Carnegie Hall 1977", year: 2008, label: "Legacy", note: "A confident mid-career showcase recorded between The Stranger and 52nd Street; strong setlist, good sound." },
    { rank: 6,  title: "A Matter of Trust: The Bridge to Russia", year: 2014, label: "Columbia", note: "Return to Russia in 1987 with a richer production; better performances than Kohuept but lesser mythology." },
    { rank: 5,  title: "Live at the Great American Music Hall, 1975", year: 2021, label: "Columbia", note: "Intimate club show on the Turnstiles tour; a young band finding its footing, with surprising freshness." },
    { rank: 4,  title: "Live at Yankee Stadium: June 22 & 23, 1990", year: 2022, label: "Legacy Recordings", note: "Stadium spectacle at commercial peak; two nights of hits delivered with precision if not much spontaneity." },
    { rank: 3,  title: "Live From Long Island", year: 2023, label: "Legacy Recordings", note: "Nassau Coliseum 1982 — a hometown crowd, an energized band, and a setlist that spans his best decade." },
    { rank: 2,  title: "12 Gardens Live", year: 2006, label: "Columbia", note: "Two-disc document of 12 MSG residency shows; the definitive late-career statement, polished and expansive." },
    { rank: 1,  title: "Songs in the Attic", year: 1981, label: "Columbia", note: "The essential Billy Joel live record; early club-era songs played with the full band energy they always deserved." },
  ];

  const unranked = [
    { rank: "NR", title: "Live Through the Years", year: 2019, label: "Columbia (digital only)", note: "Anthology compilation spanning decades of live recordings; digital-only release for the streaming era." },
  ];

  const syncStatus = document.getElementById('sync-status');
  let state = {};
  let activeFilter = 'all';

  function iconFor(s)  { return s === 'have' ? '✓' : s === 'need' ? '◯' : '·'; }
  function labelFor(s) { return s === 'have' ? 'Have it' : s === 'need' ? 'Need it' : 'Unset'; }
  function cycleStatus(cur) { return !cur ? 'have' : cur === 'have' ? 'need' : null; }

  function buildCard(a, listId) {
    const list = document.getElementById(listId);
    const s = state[a.rank] || null;
    const card = document.createElement('div');
    card.className = 'album-card' + (s ? ' ' + s : '');
    card.dataset.rank = a.rank;
    card.innerHTML = `
      <div class="status-stripe"></div>
      <div class="rank-badge">
        <span class="rank-label">Rank</span>
        <span class="rank-num">${a.rank}</span>
      </div>
      <div class="album-info">
        <div class="album-title">${a.title}</div>
        <div class="album-meta">
          <span class="album-year">${a.year}</span>
          <span class="album-label">${a.label}</span>
        </div>
        <div class="album-note">${a.note}</div>
      </div>
      <div class="toggle-wrap">
        <button class="toggle-btn" title="Click to toggle status">
          <div class="toggle-icon">${iconFor(s)}</div>
          <span class="toggle-label">${labelFor(s)}</span>
        </button>
      </div>
    `;
    card.querySelector('.toggle-btn').addEventListener('click', async (e) => {
      e.stopPropagation();
      const cur = state[a.rank] || null;
      const next = cycleStatus(cur);
      if (next) state[a.rank] = next;
      else delete state[a.rank];
      card.className = 'album-card' + (next ? ' ' + next : '');
      card.querySelector('.toggle-icon').textContent = iconFor(next);
      card.querySelector('.toggle-label').textContent = labelFor(next);
      updateStats();
      applyFilter();
      syncStatus.textContent = 'Saving…';
      syncStatus.style.color = 'var(--gold)';
      await setDoc(docRef, state, { merge: false });
    });
    list.appendChild(card);
  }

  function renderAll() {
    document.getElementById('album-list').innerHTML = '';
    document.getElementById('unranked-list').innerHTML = '';
    albums.forEach(a => buildCard(a, 'album-list'));
    unranked.forEach(a => buildCard(a, 'unranked-list'));
  }

  function updateStats() {
    let have = 0, need = 0;
    albums.forEach(a => {
      const s = state[a.rank];
      if (s === 'have') have++;
      if (s === 'need') need++;
    });
    document.getElementById('have-num').textContent = have;
    document.getElementById('need-num').textContent = need;
    const pct = Math.round((have / albums.length) * 100);
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  function applyFilter() {
    document.querySelectorAll('.album-card').forEach(card => {
      const s = state[card.dataset.rank] || null;
      const match = (
        activeFilter === 'all' ||
        (activeFilter === 'have' && s === 'have') ||
        (activeFilter === 'need' && s === 'need') ||
        (activeFilter === 'unset' && !s)
      );
      card.classList.toggle('hidden', !match);
    });
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      applyFilter();
    });
  });

  document.getElementById('btn-mark-all').addEventListener('click', async () => {
    albums.forEach(a => { state[a.rank] = 'have'; });
    renderAll(); updateStats(); applyFilter();
    await setDoc(docRef, state, { merge: false });
  });

  document.getElementById('btn-clear-all').addEventListener('click', async () => {
    state = {};
    renderAll(); updateStats(); applyFilter();
    await setDoc(docRef, {}, { merge: false });
  });

  document.getElementById('sign-out-link').addEventListener('click', async (e) => {
    e.preventDefault();
    await signOut(auth);
    window.location.href = '/tools/login.html';
  });

  onSnapshot(docRef, (snapshot) => {
    state = snapshot.exists() ? snapshot.data() : {};
    renderAll();
    updateStats();
    applyFilter();
    syncStatus.textContent = 'Synced';
    syncStatus.style.color = 'var(--green)';
  });
</script>
</body>
</html>
