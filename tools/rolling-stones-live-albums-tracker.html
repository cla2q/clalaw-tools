<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rolling Stones Live Albums Tracker</title>
<style>
  :root {
    --bg: #1a1a1a;
    --surface: #242424;
    --surface2: #2e2e2e;
    --border: #3a3a3a;
    --red: #c8102e;
    --red-dark: #a00d24;
    --red-glow: rgba(200,16,46,0.15);
    --gold: #d4a847;
    --gold-light: #e8c068;
    --green: #2ecc71;
    --green-dark: #27ae60;
    --green-bg: rgba(46,204,113,0.08);
    --need-bg: rgba(200,16,46,0.06);
    --text: #f0f0f0;
    --text-muted: #888;
    --text-dim: #aaa;
    --radius: 10px;
    --transition: 0.2s ease;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  /* NAV */
  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 820px;
    margin: 0 auto 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  nav a {
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    text-decoration: none;
    transition: color var(--transition);
  }
  nav a:hover { color: var(--gold); }
  .nav-brand { font-size: 1rem; font-weight: bold; letter-spacing: 3px; color: var(--gold); }

  .header { text-align: center; margin-bottom: 28px; }
  .header .logo { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .header .tongue { font-size: 2.2rem; line-height: 1; }
  .header h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase; color: #fff; }
  .header p { color: var(--text-muted); font-size: 0.85rem; margin-top: 4px; }

  .stats-bar { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 24px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 20px; text-align: center; min-width: 100px; }
  .stat .num { font-size: 1.6rem; font-weight: 800; display: block; }
  .stat .lbl { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }
  #stat-have .num { color: var(--green); }
  #stat-need .num { color: var(--red); }
  #stat-total .num { color: var(--gold); }

  .progress-wrap { max-width: 600px; margin: 0 auto 24px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--text-muted); margin-bottom: 5px; }
  .progress-bar { height: 8px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--green-dark), var(--green)); border-radius: 99px; transition: width 0.4s ease; width: 0%; }

  #sync-status { text-align: center; font-size: 0.72rem; color: var(--text-muted); margin-bottom: 16px; letter-spacing: 1px; }

  .controls { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 24px; }
  .filter-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); padding: 7px 16px; border-radius: 99px; font-size: 0.82rem; cursor: pointer; transition: var(--transition); font-weight: 600; letter-spacing: 0.03em; }
  .filter-btn:hover { border-color: var(--gold); color: var(--gold); }
  .filter-btn.active { background: var(--red); border-color: var(--red); color: #fff; }
  .btn-mark-all, .btn-clear-all { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 7px 16px; border-radius: 99px; font-size: 0.82rem; cursor: pointer; transition: var(--transition); font-weight: 600; }
  .btn-mark-all:hover { border-color: var(--green); color: var(--green); }
  .btn-clear-all:hover { border-color: var(--red); color: var(--red); }

  .album-list { max-width: 820px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
  .album-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); display: flex; align-items: stretch; gap: 0; overflow: hidden; transition: border-color var(--transition), box-shadow var(--transition); position: relative; }
  .album-card:hover { border-color: #555; box-shadow: 0 2px 12px rgba(0,0,0,0.4); }
  .album-card.have { border-color: rgba(46,204,113,0.35); background: linear-gradient(135deg, var(--green-bg), var(--surface)); }
  .album-card.need { border-color: rgba(200,16,46,0.25); background: linear-gradient(135deg, var(--need-bg), var(--surface)); }
  .album-card.hidden { display: none; }

  .rank-badge { display: flex; align-items: center; justify-content: center; min-width: 56px; font-weight: 900; font-size: 1.1rem; color: var(--text-muted); background: var(--surface2); border-right: 1px solid var(--border); flex-shrink: 0; position: relative; }
  .album-card.have .rank-badge { color: var(--green); }
  .album-card.need .rank-badge { color: var(--red); }
  .rank-badge .rank-label { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); position: absolute; top: 8px; left: 50%; transform: translateX(-50%); white-space: nowrap; }

  .album-info { flex: 1; padding: 12px 14px; display: flex; flex-direction: column; gap: 4px; }
  .album-title { font-weight: 700; font-size: 0.95rem; color: #fff; line-height: 1.3; }
  .album-meta { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .album-year { font-size: 0.78rem; font-weight: 700; color: var(--gold); background: rgba(212,168,71,0.12); padding: 1px 7px; border-radius: 4px; }
  .album-label { font-size: 0.75rem; color: var(--text-muted); }
  .album-tour { font-size: 0.75rem; color: var(--text-dim); font-style: italic; }
  .album-note { font-size: 0.78rem; color: var(--text-muted); line-height: 1.5; margin-top: 2px; }

  .toggle-wrap { display: flex; align-items: center; padding: 0 16px; flex-shrink: 0; }
  .toggle-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; background: none; border: none; padding: 6px; border-radius: 8px; transition: var(--transition); }
  .toggle-btn:hover { background: rgba(255,255,255,0.05); }
  .toggle-icon { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: var(--transition); background: var(--surface2); }
  .album-card.have .toggle-icon { background: var(--green-dark); border-color: var(--green); box-shadow: 0 0 10px rgba(46,204,113,0.3); }
  .album-card.need .toggle-icon { background: var(--red-dark); border-color: var(--red); box-shadow: 0 0 10px rgba(200,16,46,0.3); }
  .toggle-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; color: var(--text-muted); }
  .album-card.have .toggle-label { color: var(--green); }
  .album-card.need .toggle-label { color: var(--red); }

  .status-stripe { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .album-card.have .status-stripe { background: var(--green); }
  .album-card.need .status-stripe { background: var(--red); }
  .album-card:not(.have):not(.need) .status-stripe { background: transparent; }

  footer { text-align: center; margin-top: 36px; color: var(--text-muted); font-size: 0.75rem; }
  footer a { color: var(--red); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  @media (max-width: 540px) {
    .album-note { display: none; }
    .rank-badge { min-width: 42px; font-size: 0.9rem; }
    .toggle-wrap { padding: 0 10px; }
  }
</style>
</head>
<body>

<nav>
  <span class="nav-brand">CLA <span style="color:#444">|</span> LAW</span>
  <div style="display:flex;gap:24px;align-items:center;">
    <a href="/tools/">← Tools</a>
    <a href="#" id="sign-out-link">Sign Out</a>
  </div>
</nav>

<div class="header">
  <div class="logo">
    <span class="tongue">👅</span>
    <h1>Rolling Stones Live Albums Tracker</h1>
  </div>
  <p>Ranked by Ultimate Classic Rock &mdash; Mark what you have or still need</p>
</div>

<div class="stats-bar">
  <div class="stat" id="stat-total"><span class="num" id="total-num">36</span><span class="lbl">Total Albums</span></div>
  <div class="stat" id="stat-have"><span class="num" id="have-num">0</span><span class="lbl">Have It</span></div>
  <div class="stat" id="stat-need"><span class="num" id="need-num">0</span><span class="lbl">Need It</span></div>
</div>

<div class="progress-wrap">
  <div class="progress-label"><span>Collection Progress</span><span id="progress-pct">0%</span></div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<div id="sync-status">Connecting…</div>

<div class="controls">
  <button class="filter-btn active" data-filter="all">All (36)</button>
  <button class="filter-btn" data-filter="have">Have It</button>
  <button class="filter-btn" data-filter="need">Need It</button>
  <button class="filter-btn" data-filter="unset">Unmarked</button>
  <button class="btn-mark-all" id="btn-mark-all">✓ Mark All as Have</button>
  <button class="btn-clear-all" id="btn-clear-all">✕ Clear All</button>
</div>

<div class="album-list" id="album-list"></div>

<footer>
  <p>Source: <a href="https://ultimateclassicrock.com/rolling-stones-live-albums-ranked/" target="_blank">Ultimate Classic Rock — Rolling Stones Live Albums Ranked</a></p>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBfayRskS6VQ8zLMesm3_4ZB1HX84ZbPJ8",
    authDomain: "clalaw-media-watchlist.firebaseapp.com",
    projectId: "clalaw-media-watchlist",
    storageBucket: "clalaw-media-watchlist.firebasestorage.app",
    messagingSenderId: "980630708974",
    appId: "1:980630708974:web:8e3d0f9a0d9848b2df49ff"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const docRef = doc(db, "checklists", "rolling-stones");

  // Auth guard
  const ALLOWED = ['anderson.cl@gmail.com', 'vbrotski@gmail.com', 'anderson.cl@pm.me'];
  document.body.style.visibility = 'hidden';
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = `/tools/login.html?redirect=${encodeURIComponent(window.location.pathname)}`;
    } else if (!ALLOWED.includes(user.email)) {
      await signOut(auth);
      window.location.href = '/tools/login.html?error=unauthorized';
    } else {
      document.body.style.visibility = 'visible';
    }
  });

  const albums = [
    { rank: 1,  title: "Get Yer Ya-Ya's Out! The Rolling Stones in Concert", year: 1970, label: "Decca",          tour: "1969 North American Tour",                        note: "Recorded 1969; considered the band's best live LP — raw, thrilling, dangerous." },
    { rank: 2,  title: "Brussels Affair (Live 1973)",                         year: 2011, label: "Promotone BV",   tour: "1973 European Tour",                              note: "Famous bootleg officially released; one of the last great stage stands before weariness set in." },
    { rank: 3,  title: "Live at the El Mocambo",                              year: 2022, label: "Polydor",        tour: "Secret shows, Toronto 1977",                      note: "Two secret club shows; loose, intimate, and revitalizing between Black and Blue and Some Girls." },
    { rank: 4,  title: "On Air",                                              year: 2017, label: "Polydor",        tour: "BBC Sessions 1963–65",                            note: "18 BBC radio recordings; a portrait of a young band on the verge of greatness." },
    { rank: 5,  title: "Grrr Live!",                                          year: 2023, label: "Mercury",        tour: "50th Anniversary Tour, Newark 2012",              note: "Two-disc set from Newark with guests including Springsteen, Lady Gaga, and Mick Taylor." },
    { rank: 6,  title: "Live at the Checkerboard Lounge, Chicago 1981",       year: 2012, label: "Eagle Rock",     tour: "1981 North American Tour (club show)",            note: "Shared set with Muddy Waters at Buddy Guy's club; Jagger, Richards & Wood at their most fun." },
    { rank: 7,  title: "Licked Live in NYC",                                  year: 2022, label: "Mercury",        tour: "Licks Tour, MSG 2003",                            note: "Originally broadcast on HBO; 40th-anniversary victory lap at Madison Square Garden." },
    { rank: 8,  title: "The Marquee Club Live in 1971 (From the Vault Collection)", year: 2015, label: "Eagle Rock", tour: "1971 UK Tour",                                 note: "Last show of the UK Sticky Fingers tour; a bit ragged but historically revealing." },
    { rank: 9,  title: "A Bigger Bang – Live on Copacabana Beach",            year: 2021, label: "Mercury",        tour: "A Bigger Bang Tour, Rio 2006",                    note: "1.5 million in attendance; one of the largest free concerts ever." },
    { rank: 10, title: "Havana Moon",                                         year: 2016, label: "Eagle Rock",     tour: "Havana, Cuba 2016",                               note: "Historic free show in Cuba for half a million people; two-hour set of classics." },
    { rank: 11, title: "Stripped",                                            year: 1995, label: "Virgin",         tour: "Voodoo Lounge Tour (acoustic/stripped)",          note: "Mostly unplugged; reworked classics and rarities breathe new life. Expanded as Totally Stripped (2016)." },
    { rank: 12, title: "The Rolling Stones Rock and Roll Circus",             year: 1996, label: "Decca",          tour: "TV Special, December 1968",                       note: "Shelved for nearly 30 years; star-studded alongside The Who, John Lennon, and Jethro Tull." },
    { rank: 13, title: "Welcome to Shepherd's Bush",                          year: 2024, label: "Polydor",        tour: "Warm-up show, London 1999",                       note: "Intimate 2,000-seat show; rare songs including Black and Blue's 'Melody' and Sheryl Crow guest." },
    { rank: 14, title: "Hyde Park Live",                                      year: 2013, label: "Promotone BV",   tour: "Hyde Park, London 2013",                          note: "Return to Hyde Park 44 years after the famous 1969 free show; later reissued as Sweet Summer Sun." },
    { rank: 15, title: "Shine a Light",                                       year: 2008, label: "Polydor",        tour: "Beacon Theatre, NYC 2006 (Martin Scorsese film)", note: "Small club atmosphere; focused on classics and obscurities rather than A Bigger Bang." },
    { rank: 16, title: "Live Licks",                                          year: 2004, label: "Virgin",         tour: "Licks Tour (40th Anniversary)",                   note: "Double-album of hits from the 40th-anniversary tour; no surprises, just polished classics." },
    { rank: 17, title: "Sticky Fingers Live",                                 year: 2015, label: "Rolling Stones", tour: "Fonda Theatre, LA 2015",                          note: "Full Sticky Fingers album performed for 1,200 fans to promote the expanded reissue." },
    { rank: 18, title: "Live at the Tokyo Dome (Live 1990)",                  year: 2012, label: "Promotone BV",   tour: "Urban Jungle Tour, Japan 1990",                   note: "Japan stadium show; wall-to-wall hits for devoted fans." },
    { rank: 19, title: "No Security",                                         year: 1998, label: "Virgin",         tour: "Bridges to Babylon Tour 1997–98",                 note: "Some rare inclusions ('Memory Motel', 'Sister Morphine') but also familiar filler." },
    { rank: 20, title: "Got Live If You Want It!",                            year: 1966, label: "London",         tour: "UK Tour 1965",                                    note: "First live album; barely audible over screaming fans but proves Stones rivaled the Beatles." },
    { rank: 21, title: "Still Life",                                          year: 1982, label: "Rolling Stones", tour: "1981 North American Tour",                        note: "Only 10 songs; predictable set-list makes it feel like a cash-grab despite a strong tour." },
    { rank: 22, title: "Flashpoint",                                          year: 1991, label: "Rolling Stones", tour: "Steel Wheels/Urban Jungle Tour 1989–90",          note: "76-minute set sags; two tacked-on studio songs don't help. Still more animated than the '80s." },
    { rank: 23, title: "Love You Live",                                       year: 1977, label: "Rolling Stones", tour: "Tour of the Americas 1975–76 / Toronto 1977",      note: "Sprawling double album; languid performances, later overdubbed to make them listenable." },
    { rank: 24, title: "Charlie Is My Darling - Ireland 1965",                year: 2014, label: "ABKCO",          tour: "Ireland 1965",                                    note: "Companion to the film; clearer than Got Live If You Want It! and historically fascinating." },
    { rank: 25, title: "Some Girls: Live in Texas '78",                       year: 2011, label: "Eagle Rock",     tour: "Some Girls Tour, Texas 1978",                     note: "Band fighting back; then-new cuts 'Beast of Burden' and 'Miss You' alongside the usual suspects." },
    { rank: 26, title: "Hampton Coliseum (Live 1981)",                        year: 2012, label: "Promotone BV",   tour: "1981 North American Tour",                        note: "First live pay-per-view concert; band in great shape but low enthusiasm." },
    { rank: 27, title: "Steel Wheels Live",                                   year: 2020, label: "Eagle Rock",     tour: "Steel Wheels Tour, NJ 1989",                      note: "Two-and-a-half-hour show; guests Clapton, Hooker & Axl Rose amid hits and new tracks." },
    { rank: 28, title: "Voodoo Lounge Uncut",                                 year: 2018, label: "Eagle Rock",     tour: "Voodoo Lounge Tour, Miami 1994",                  note: "Originally a pay-per-view broadcast; autopilot but fine, with cameos by Robert Cray and Sheryl Crow." },
    { rank: 29, title: "Light the Fuse (Live 2005)",                          year: 2012, label: "Promotone BV",   tour: "A Bigger Bang Tour, small venue 2005",            note: "Rare tracks ('Live With Me', '19th Nervous Breakdown', Bob Marley cover) before the usual closers." },
    { rank: 30, title: "L.A. Friday (Live 1975)",                             year: 2012, label: "Promotone BV",   tour: "Tour of the Americas 1975, LA Forum",             note: "Band barely trying; mislabeled as 'Friday' (was a Sunday). Superior versions of everything exist." },
    { rank: 31, title: "Live at Leeds (Live 1982)",                           year: 2012, label: "Promotone BV",   tour: "European Tour 1982 (final show)",                 note: "Final stop of the Tattoo You tour; band sounds ready for a break." },
    { rank: 32, title: "Live at the Wiltern",                                 year: 2024, label: "Mercury",        tour: "Licks Tour, LA 2002",                             note: "Intimate 2,000-seat show from the 40th-anniversary tour; no curve balls but good atmosphere." },
    { rank: 33, title: "Bridges to Buenos Aires (Live)",                      year: 2019, label: "Eagle Rock",     tour: "Bridges to Babylon Tour, Argentina 1998",         note: "Slight edge over Bremen thanks to a Bob Dylan cameo on 'Like a Rolling Stone'." },
    { rank: 34, title: "Bridges to Bremen",                                   year: 2019, label: "Eagle Rock",     tour: "Bridges to Babylon Tour, Germany 1998",           note: "Fan-voted 'Memory Hotel' is the main rarity; otherwise standard set from the Babylon Tour." },
    { rank: 35, title: "No Security. San Jose '99 (From the Vault Collection)", year: 2018, label: "Eagle Rock",   tour: "No Security Tour, San Jose 1999",                 note: "Surprising inclusions ('Respectable', 'You Got the Silver') amid more 'Start Me Up' and 'Flash'." },
    { rank: 36, title: "Live at Racket, NYC",                                 year: 2024, label: "Rolling Stones", tour: "Hackney Diamonds release show, NYC 2023",         note: "Seven-song Record Store Day release; mostly Hackney Diamonds tracks plus Lady Gaga. Collectors only." },
  ];

  const syncStatus = document.getElementById('sync-status');
  let state = {};
  let activeFilter = 'all';

  function iconFor(s)  { return s === 'have' ? '✓' : s === 'need' ? '◯' : '?'; }
  function labelFor(s) { return s === 'have' ? 'Have It' : s === 'need' ? 'Need It' : 'Unset'; }
  function cycleStatus(cur) { return !cur ? 'have' : cur === 'have' ? 'need' : null; }

  function renderCards() {
    const list = document.getElementById('album-list');
    list.innerHTML = '';
    albums.forEach(a => {
      const s = state[a.rank] || null;
      const card = document.createElement('div');
      card.className = 'album-card' + (s ? ' ' + s : '');
      card.dataset.rank = a.rank;
      card.innerHTML = `
        <div class="status-stripe"></div>
        <div class="rank-badge">
          <span class="rank-label">Rank</span>
          <span class="rank-num">${a.rank}</span>
        </div>
        <div class="album-info">
          <div class="album-title">${a.title}</div>
          <div class="album-meta">
            <span class="album-year">${a.year}</span>
            <span class="album-label">${a.label}</span>
          </div>
          <div class="album-tour">${a.tour}</div>
          <div class="album-note">${a.note}</div>
        </div>
        <div class="toggle-wrap">
          <button class="toggle-btn" title="Click to toggle status">
            <div class="toggle-icon">${iconFor(s)}</div>
            <span class="toggle-label">${labelFor(s)}</span>
          </button>
        </div>
      `;
      card.querySelector('.toggle-btn').addEventListener('click', async (e) => {
        e.stopPropagation();
        const cur = state[a.rank] || null;
        const next = cycleStatus(cur);
        if (next) state[a.rank] = next;
        else delete state[a.rank];
        card.className = 'album-card' + (next ? ' ' + next : '');
        card.querySelector('.toggle-icon').textContent = iconFor(next);
        card.querySelector('.toggle-label').textContent = labelFor(next);
        updateStats();
        applyFilter();
        syncStatus.textContent = 'Saving…';
        syncStatus.style.color = '#d4a847';
        await setDoc(docRef, state, { merge: false });
      });
      list.appendChild(card);
    });
  }

  function updateStats() {
    let have = 0, need = 0;
    albums.forEach(a => {
      const s = state[a.rank];
      if (s === 'have') have++;
      if (s === 'need') need++;
    });
    document.getElementById('have-num').textContent = have;
    document.getElementById('need-num').textContent = need;
    const pct = Math.round((have / albums.length) * 100);
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  function applyFilter() {
    document.querySelectorAll('.album-card').forEach(card => {
      const s = state[card.dataset.rank] || null;
      const match = (
        activeFilter === 'all' ||
        (activeFilter === 'have' && s === 'have') ||
        (activeFilter === 'need' && s === 'need') ||
        (activeFilter === 'unset' && !s)
      );
      card.classList.toggle('hidden', !match);
    });
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      applyFilter();
    });
  });

  document.getElementById('btn-mark-all').addEventListener('click', async () => {
    albums.forEach(a => { state[a.rank] = 'have'; });
    renderCards(); updateStats(); applyFilter();
    await setDoc(docRef, state, { merge: false });
  });

  document.getElementById('btn-clear-all').addEventListener('click', async () => {
    state = {};
    renderCards(); updateStats(); applyFilter();
    await setDoc(docRef, {}, { merge: false });
  });

  document.getElementById('sign-out-link').addEventListener('click', async (e) => {
    e.preventDefault();
    await signOut(auth);
    window.location.href = '/tools/login.html';
  });

  // Real-time Firebase listener
  onSnapshot(docRef, (snapshot) => {
    state = snapshot.exists() ? snapshot.data() : {};
    renderCards();
    updateStats();
    applyFilter();
    syncStatus.textContent = 'Synced';
    syncStatus.style.color = '#2ecc71';
  });
</script>
</body>
</html>
