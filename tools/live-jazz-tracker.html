<style>
  :root {
    --green-dark: #4a8a52;
    --green-bg:   rgba(106,158,114,0.08);
    --red-dark:   #8a3a2a;
    --need-bg:    rgba(184,92,74,0.06);
    --transition: 0.2s ease;
  }

  body { padding: 24px 16px 64px; }

  /* HEADER */
  .page-header { text-align: center; margin-bottom: 28px; max-width: 820px; margin-left: auto; margin-right: auto; }
  .page-eyebrow { font-family: var(--f-ui); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold-dim); margin-bottom: 10px; }
  .page-title { font-family: var(--f-display); font-size: 36px; font-weight: 300; color: var(--text); line-height: 1.1; margin-bottom: 6px; }
  .page-sub { font-family: var(--f-display); font-size: 14px; font-style: italic; color: var(--text-2); }

  /* STATS */
  .stats-bar { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 24px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 10px 20px; text-align: center; min-width: 100px; }
  .stat .num { font-family: var(--f-display); font-size: 2rem; font-weight: 300; display: block; }
  .stat .lbl { font-family: var(--f-ui); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-3); }
  #stat-have .num { color: var(--green); }
  #stat-need .num { color: var(--red); }
  #stat-total .num { color: var(--gold); }

  /* PROGRESS */
  .progress-wrap { max-width: 600px; margin: 0 auto 24px; }
  .progress-label { display: flex; justify-content: space-between; font-family: var(--f-ui); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); margin-bottom: 6px; }
  .progress-bar { height: 2px; background: var(--surface-2); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 99px; transition: width 0.4s ease; width: 0%; }

  /* SYNC */
  #sync-status { text-align: center; font-family: var(--f-ui); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); margin-bottom: 16px; }

  /* CONTROLS */
  .controls { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 28px; }
  .filter-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-3); padding: 6px 16px; border-radius: 99px; font-family: var(--f-ui); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: var(--transition); }
  .filter-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
  .filter-btn.active { background: var(--red); border-color: var(--red); color: var(--text); }
  .bulk-btn { background: transparent; border: 1px solid var(--border); color: var(--text-3); padding: 6px 16px; border-radius: 99px; font-family: var(--f-ui); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: var(--transition); }
  #btn-mark-all:hover { border-color: var(--green); color: var(--green); }
  #btn-clear:hover { border-color: var(--red); color: var(--red); }

  /* SECTION LABEL */
  .section-label { font-family: var(--f-ui); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-3); max-width: 820px; margin: 8px auto 4px; padding-left: 4px; }

  /* ALBUM LIST */
  .album-list { max-width: 820px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }

  /* ALBUM CARD */
  .album-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); display: flex; align-items: center; gap: 0; overflow: hidden; transition: border-color var(--transition); cursor: pointer; position: relative; }
  .album-card:hover { border-color: var(--gold-dim); }
  .album-card.state-have { border-color: rgba(106,158,114,0.35); background: linear-gradient(135deg, var(--green-bg), var(--surface)); }
  .album-card.state-need { border-color: rgba(184,92,74,0.25); background: linear-gradient(135deg, var(--need-bg), var(--surface)); }
  .album-card.hidden { display: none; }

  .status-stripe { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .album-card.state-have .status-stripe { background: var(--green); }
  .album-card.state-need .status-stripe { background: var(--red); }

  /* RANK */
  .rank-col { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 56px; align-self: stretch; background: var(--surface-2); border-right: 1px solid var(--border); flex-shrink: 0; padding: 8px 0; }
  .rank-label { font-family: var(--f-ui); font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-3); }
  .rank-num { font-family: var(--f-display); font-weight: 300; font-size: 1.4rem; color: var(--text-3); line-height: 1; }
  .album-card.state-have .rank-num { color: var(--green); }
  .album-card.state-need .rank-num { color: var(--red); }

  /* INFO */
  .info-col { flex: 1; padding: 12px 14px; min-width: 0; }
  .album-title { font-family: var(--f-display); font-weight: 400; font-size: 1rem; color: var(--text); line-height: 1.3; }
  .album-meta { display: flex; gap: 8px; align-items: center; margin-top: 4px; flex-wrap: wrap; }
  .badge-year { font-family: var(--f-ui); font-size: 10px; color: var(--gold); background: rgba(200,169,110,0.1); padding: 2px 7px; border-radius: var(--radius-sm); letter-spacing: 0.08em; }
  .badge-label { font-family: var(--f-ui); font-size: 10px; letter-spacing: 0.06em; color: var(--text-3); }
  .album-venue { font-family: var(--f-display); font-size: 13px; font-style: italic; color: var(--gold-dim); margin-top: 3px; }
  .album-desc { font-family: var(--f-display); font-size: 13px; font-style: italic; color: var(--text-2); line-height: 1.55; margin-top: 3px; }

  /* TOGGLE */
  .action-col { display: flex; flex-direction: column; align-items: center; min-width: 62px; padding: 0 12px; flex-shrink: 0; }
  .toggle-btn { width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface-2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; color: var(--text-3); transition: var(--transition); }
  .album-card.state-have .toggle-btn { background: var(--green-dark); border-color: var(--green); color: var(--text); }
  .album-card.state-need .toggle-btn { background: var(--red-dark); border-color: var(--red); color: var(--text); }
  .toggle-label { font-family: var(--f-ui); font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-3); margin-top: 4px; }
  .album-card.state-have .toggle-label { color: var(--green); }
  .album-card.state-need .toggle-label { color: var(--red); }

  @media (max-width: 540px) {
    .album-desc, .album-venue { display: none; }
    .rank-col { min-width: 42px; }
    .action-col { padding: 0 8px; min-width: 50px; }
  }
</style>

      card.dataset.state = s;
      card.innerHTML = `
        <div class="status-stripe"></div>
        <div class="rank-col">
          <span class="rank-label">Rank</span>
          <span class="rank-num">${a.rank}</span>
        </div>
        <div class="info-col">
          <div class="album-title">${a.title}</div>
          <div class="album-meta">
            <span class="badge-year">${a.year}</span>
            <span class="badge-label">${a.label}</span>
          </div>
          <div class="album-venue">${a.sub}</div>
          <div class="album-desc">${a.desc}</div>
        </div>
        <div class="action-col">
          <button class="toggle-btn" title="Click to cycle: Unset → Have → Need">${stateIcon(s)}</button>
          <span class="toggle-label">${stateLabel(s)}</span>
        </div>
      `;
      card.addEventListener('click', async () => {
        const newState = cycleState(a.rank);
        card.className = `album-card state-${newState}`;
        card.dataset.state = newState;
        card.querySelector('.toggle-btn').textContent = stateIcon(newState);
        card.querySelector('.toggle-label').textContent = stateLabel(newState);
        updateStats();
        applyFilter(currentFilter);
        syncStatus.textContent = 'Saving…';
        syncStatus.style.color = 'var(--gold)';
        await setDoc(docRef, states, { merge: false });
      });
      list.appendChild(card);
    });
  }

  function updateStats() {
    const cards = document.querySelectorAll('.album-card');
    let have = 0, need = 0;
    cards.forEach(c => {
      if (c.dataset.state === 'have') have++;
      else if (c.dataset.state === 'need') need++;
    });
    document.getElementById('stat-have').textContent = have;
    document.getElementById('stat-need').textContent = need;
    const pct = Math.round((have / albums.length) * 100);
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-bar').style.width = pct + '%';
  }

  function applyFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.filter === filter);
    });
    document.querySelectorAll('.album-card').forEach(c => {
      const s = c.dataset.state;
      let show = true;
      if (filter === 'have') show = s === 'have';
      else if (filter === 'need') show = s === 'need';
      else if (filter === 'unset') show = s === 'unset';
      c.classList.toggle('hidden', !show);
    });
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => applyFilter(btn.dataset.filter));
  });

  document.getElementById('btn-mark-all').addEventListener('click', async () => {
    albums.forEach(a => { states[a.rank] = 'have'; });
    buildCards(); updateStats(); applyFilter(currentFilter);
    await setDoc(docRef, states, { merge: false });
  });

  document.getElementById('btn-clear').addEventListener('click', async () => {
    states = {};
    buildCards(); updateStats(); applyFilter(currentFilter);
    await setDoc(docRef, {}, { merge: false });
  });

  document.getElementById('sign-out-link').addEventListener('click', async (e) => {
    e.preventDefault();
    await signOut(auth);
    window.location.href = '/tools/login.html';
  });

  onSnapshot(docRef, (snapshot) => {
    states = snapshot.exists() ? snapshot.data() : {};
    buildCards();
    updateStats();
    applyFilter(currentFilter);
    syncStatus.textContent = 'Synced';
    syncStatus.style.color = 'var(--green)';
  });
</script>
</body>
</html>
